name: authelia

x-daemonless:
  title: "Authelia"
  icon: ":simple-authelia:"
  category: "Infrastructure"
  description: "Authelia on FreeBSD."
  upstream_url: "https://github.com/authelia/authelia"
  web_url: "https://authelia.org/"
  freshports_url: "https://www.freshports.org/net-p2p/authelia/"
  user: "bsd"
  mlock: false
  community: "Discord:https://discord.gg/Kb9tkhecZT"

  docs:
    env:
      PUID: "User ID for the application process"
      PGID: "Group ID for the application process"
      TZ: "Timezone for the container"
    volumes:
      /config: "Configuration directory"
    ports:
      9091: "Web UI"

services:
  authelia-server:
    image: ghcr.io/daemonless/authelia-server:latest
    container_name: authelia-server
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - /path/to/containers/authelia/config:/config
    ports:
      - 9091:9091
    depends_on:
      - redis

  redis:
    container_name: authelia_redis
    image: ghcr.io/daemonless/redis:latest
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - redis:/config

volumes:
  redis:
